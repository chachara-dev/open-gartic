<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cháchara - Inicio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="doodle d1">✏️</div>
    <div class="doodle d2">💬</div>
    <div class="doodle d3">🎨</div>
    <div class="doodle d4">💡</div>
    <div class="doodle d5">😂</div>
    <div class="doodle d6">🎲</div>
    <!-- Talvez lo cambie a algo mas bonito -->
     
    <div class="login-container">
        <header class="logo">
            <h1>CHÁCHARA</h1> <!-- Falta el logo oficial   -->
        </header>
        
        <div class="card">
            <div class="avatar-selection">
                <div id="avatar-display">🎨</div>
                <p>Elige tu avatar</p>
            </div>

            <input type="text" id="username" placeholder="Escribe tu apodo..." maxlength="15" autocomplete="off">
            
            <button id="btn-play">¡A JUGAR!</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
